<html lang="en">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/responsive.css">
    <style>
        form { display: flex; flex-direction: column; gap: 1rem; }
        input, textarea { padding: 10px; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); color: #fff; border-radius: 4px; }
        input:focus, textarea:focus { outline: none; border-color: var(--primary-neon); }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="logo">Shield<span>Sec</span></a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>

        </ul>

    <div class="container animate-fade-in" style="max-width: 600px;">
        <div class="glass-card">
            <h2 class="cyber-text">Report an Issue / Contact Us</h2>
            <p style="margin-bottom: 2rem;">Have a question about the training or found a bug? Let us know.</p>
            <form onsubmit="event.preventDefault(); alert('Message Sent! (Simulation)');">
                <input type="text" placeholder="Your Name" required>
                <input type="email" placeholder="Your Email" required>
                <textarea rows="5" placeholder="Your Message" required></textarea>
                <button type="submit" class="btn-cyber">Send Message</button>
            </form>
        </div>
    </div>

    <script src="js/progress.js"></script>
